<!DOCTYPE html>
<html>

<head>

<title>You Nailed It!</title>

<style>

body{
background:#080c08;
color:white;
font-family:Arial;
display:flex;
align-items:center;
justify-content:center;
height:100vh;
overflow:hidden;
}

.card{
background:#0e130e;
border:1px solid #1a241a;
border-radius:8px;
padding:40px;
text-align:center;
width:420px;
z-index:3;
}

h1{
color:#3ddc84;
}

.reward{
margin-top:20px;
font-size:20px;
}

.buttons{
margin-top:25px;
display:flex;
gap:15px;
justify-content:center;
}

.btn{
padding:12px 22px;
border:none;
background:#3ddc84;
border-radius:6px;
cursor:pointer;
font-size:16px;
text-decoration:none;
color:black;
}

/* confetti canvas */

#confetti{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
pointer-events:none;
z-index:1;
}

</style>

</head>

<body>

<canvas id="confetti"></canvas>

<div class="card">

<h1>You Nailed It!</h1>

<p>Team <b>{{ team }}</b> cracked the password!</p>

<div style="font-size: 20px; font-weight: bold; margin-bottom: 15px; color: #ff6b6b; z-index: 10; position: relative;">
    ⏳ Time Left: <span id="time-display">--:--</span>
</div>

{% if reward_type == "movie" %}

<div class="reward">
🎬 Act The Telugu Movie: <b>{{ reward_value }}</b>
</div>

{% else %}

<div class="reward">
🎤Act this Song: <b>{{ reward_value }}</b>
</div>

{% endif %}

<div class="buttons">

<a href="/game" class="btn">
Play Again
</a>

<a href="/next_team" class="btn">
Next Team →
</a>

</div>

</div>

<script>

const canvas=document.getElementById("confetti");
const ctx=canvas.getContext("2d");

canvas.width=window.innerWidth;
canvas.height=window.innerHeight;

const colors=[
"#e8b84b",
"#3ddc84",
"#ff4d6d",
"#4da6ff",
"#ffb347"
];

const pieces=[];

for(let i=0;i<120;i++){
pieces.push({
x:Math.random()*canvas.width,
y:Math.random()*canvas.height-canvas.height,
size:6+Math.random()*6,
speed:2+Math.random()*3,
color:colors[Math.floor(Math.random()*colors.length)],
opacity:1
});
}

let slowing=false;
let finished=false;
let animationId;

setTimeout(()=>{
slowing=true;
},2000);

setTimeout(()=>{
finished=true;
cancelAnimationFrame(animationId);
ctx.clearRect(0,0,canvas.width,canvas.height);
},4000);

function draw(){

ctx.clearRect(0,0,canvas.width,canvas.height);

pieces.forEach(p=>{

ctx.globalAlpha=p.opacity;

ctx.fillStyle=p.color;

ctx.fillRect(p.x,p.y,p.size,p.size);

p.y+=p.speed;

if(slowing){
p.speed*=0.92;
p.opacity-=0.04;
}

});

ctx.globalAlpha=1;

if(!finished){
animationId=requestAnimationFrame(draw);
}

}

draw();

// --- Timer Logic ---
let timeLeft = parseInt("{{ timer }}", 10);
if (isNaN(timeLeft)) timeLeft = 180;
const timeDisplay = document.getElementById('time-display');

function playBeepAndRedirect() {
    try {
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        const oscillator = audioCtx.createOscillator();
        const gainNode = audioCtx.createGain();
        
        oscillator.type = 'square';
        oscillator.frequency.setValueAtTime(880, audioCtx.currentTime); // A5 note
        gainNode.gain.setValueAtTime(0.1, audioCtx.currentTime); 
        
        oscillator.connect(gainNode);
        gainNode.connect(audioCtx.destination);
        
        oscillator.start();
        setTimeout(() => {
            oscillator.stop();
            window.location.href = '/timeout';
        }, 800);
    } catch (e) {
        window.location.href = '/timeout';
    }
}

function updateDisplay() {
    if (timeLeft <= 0) {
        clearInterval(timerInterval);
        timeDisplay.textContent = "00:00";
        playBeepAndRedirect();
        return;
    }
    const minutes = Math.floor(timeLeft / 60);
    const seconds = timeLeft % 60;
    timeDisplay.textContent = 
        (minutes < 10 ? "0" : "") + minutes + ":" + 
        (seconds < 10 ? "0" : "") + seconds;
}

updateDisplay();
const timerInterval = setInterval(() => {
    timeLeft--;
    updateDisplay();
}, 1000);

</script>

</body>
</html>
