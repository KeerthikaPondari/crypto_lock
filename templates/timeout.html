<!DOCTYPE html>
<html>
<head>
<title>Time's Up!</title>
<style>
body {
    background: #080c08;
    color: white;
    font-family: Arial;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}
.card {
    background: #0e130e;
    border: 1px solid #1a241a;
    border-radius: 8px;
    padding: 40px;
    text-align: center;
    width: 420px;
}
h1 { color: #ff4d6d; }
.btn {
    display: inline-block;
    margin-top: 20px;
    padding: 12px 22px;
    background: #e8b84b;
    color: black;
    text-decoration: none;
    border-radius: 6px;
    font-weight: bold;
}
</style>
</head>
<body>
<div class="card">
    <h1>⏰ Time's Up!</h1>
    <p>Sorry <b>{{ team }}</b>, your 3 minutes are over!</p>
    <p>The word was: <b>{{ word }}</b></p>
    <p>Your Score: <b>{{ score }}</b></p>
    <a href="/next_team" class="btn">Next Team →</a>
</div>
</body>
</html>
